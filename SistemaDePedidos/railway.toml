[build]
builder = "python"

[deploy]
buildCommand = "python -m pip install --upgrade pip && pip install -r SistemaDePedidos/requirements.txt && python SistemaDePedidos/manage.py collectstatic --noinput"
startCommand = "gunicorn SistemaDePedidos.SistemaDePedidos.wsgi:application --chdir SistemaDePedidos"

{% load static %}

<div class="carrito-container">
  {% if request.session.carro.items %}
    {% for key, value in request.session.carro.items %}
      <div class="carrito-item d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-3">
          <img src="{{ value.imagen }}" alt="{{ value.nombre }}" class="carrito-img">
          <div>
            <h6 class="mb-0 text-light fw-semibold">{{ value.nombre }}</h6>
            <small class="text-muted">{{ value.cantidad }} × ${{ value.precio }}</small>
          </div>
        </div>

        <div class="d-flex align-items-center gap-2">
          <a href="{% url 'carro:restar' value.producto_id %}" class="btn btn-sm btn-outline-light rounded-circle">−</a>
          <a href="{% url 'carro:agregar' value.producto_id %}" class="btn btn-sm btn-outline-light rounded-circle">+</a>
          <a href="{% url 'carro:eliminar' value.producto_id %}" class="btn btn-sm btn-outline-danger rounded-circle">
            <i class="fa-solid fa-trash"></i>
          </a>
        </div>
      </div>
    {% endfor %}

    <hr class="text-secondary my-3">

    <div class="carrito-footer text-end">
      <h5 class="text-light">Total: <span class="text-warning">${{ importe_total_carro }}</span></h5>
      <div class="mt-3 d-flex justify-content-between">
        <a href="{% url 'carro:limpiar' %}" class="btn btn-outline-danger btn-sm">Vaciar</a>
        <a href="{% url 'carro:realizar_pedido' %}" class="btn btn-primary btn-sm fw-semibold">Finalizar pedido</a>
      </div>
    </div>

  {% else %}
    <div class="text-center py-5 text-secondary">
      <i class="fa-solid fa-cart-shopping fa-3x mb-3 text-secondary"></i>
      <p class="mb-0">Tu carrito está vacío</p>
    </div>
  {% endif %}
</div>

<style>
/* === CONTENEDOR GENERAL === */
.carrito-container {
  font-family: 'Inter', sans-serif;
  background-color: #181818;
  color: #e0e0e0;
  border-radius: 14px;
  padding: 1rem;
  box-shadow: inset 0 0 8px rgba(100, 0, 200, 0.3);
}

/* === ITEM === */
.carrito-item {
  background-color: #222;
  padding: 0.75rem;
  border-radius: 12px;
  margin-bottom: 0.75rem;
  transition: background 0.3s ease, transform 0.2s ease;
  border: 1px solid rgba(130, 0, 255, 0.2);
}

.carrito-item:hover {
  background-color: #2a2a2a;
  transform: scale(1.02);
}

/* === IMAGEN === */
.carrito-img {
  width: 55px;
  height: 55px;
  object-fit: cover;
  border-radius: 10px;
  border: 1px solid rgba(180, 130, 255, 0.3);
}

/* === BOTONES === */
.btn-outline-light {
  border-color: #a370ff !important;
  color: #cbb2ff !important;
  transition: all 0.3s ease;
}

.btn-outline-light:hover {
  background-color: #a370ff !important;
  color: #fff !important;
}

.btn-outline-danger {
  border-color: #d63384 !important;
  color: #ff7bc2 !important;
}

.btn-outline-danger:hover {
  background-color: #d63384 !important;
  color: white !important;
}

.btn-primary {
  background-color: #6f42c1;
  border: none;
  transition: background 0.3s;
}

.btn-primary:hover {
  background-color: #8557d6;
}

/* === SEPARADORES === */
hr {
  border-color: rgba(150, 100, 255, 0.2);
}
</style>

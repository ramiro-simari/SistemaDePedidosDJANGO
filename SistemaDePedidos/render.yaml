services:
  - type: web
    name: sistema-de-pedidos
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn SistemaDePedidos.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-de-pedidos-db
          property: connectionString

databases:
  - name: sistema-de-pedidos-db
    plan: free
